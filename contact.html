<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">Ethan</a>
        <nav class="navbar">
            <a href="index.html#home">Home</a>
            <a href="index.html#about">About</a>
            <a href="education.html">Education</a>
            <a href="skills.html">Skills</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <ul class="background-squares">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <section class="contact-section">
        <div class="contact-container">
            <h2 class="heading">Contact <span>Me</span></h2>
            
            <div class="contact-grid">
                <div class="contact-card">
                    <h3 class="contact-title">Get In Touch</h3>
                    
                    <form id="contactForm" class="actual-form">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" placeholder="John Doe" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="_replyto" placeholder="john@example.com" required>
                        </div>

                        <div class="form-group">
                            <label for="message">Your Message</label>
                            <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>
                        </div>

                        <div class="btn-box">
                            <button type="submit" id="submitBtn" class="btn form-submit-btn">Send Message</button>
                        </div>
                        
                        <p id="formStatus" class="form-status-msg"></p>
                    </form>
                    
                    <div class="contact-footer-info">
                        <div class="contact-item">
                            <i class='bx bx-map'></i>
                            <div>
                                <h4>Location</h4>
                                <p>London, United Kingdom</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
